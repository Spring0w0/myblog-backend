# 开发环境配置
upload:
  path: d:/MizukiCode/deploy/data/uploads/  # 开发环境上传路径
  base-url: http://localhost:8080/uploads  # 图片访问基础URL

spring:
  servlet:
    multipart:
      max-file-size: 10MB #最大10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: file:${upload.path},classpath:/static/
  application:
    name: myblog-backend

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/my_blog?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

# 服务器配置
server:
  port: 8080

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.spring0w0.myblog.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl